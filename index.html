<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alejandro Duhalde | Data Engineer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .data-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .card-hover:hover { transform: translateY(-5px); border-color: #3b82f6; transition: all 0.3s ease; }
        
        /* --- TRADUCTOR --- */
        #google_translate_element { display: inline-block; vertical-align: middle; }
        .goog-logo-link, .goog-te-gadget span { display: none !important; }
        .goog-te-gadget { color: transparent !important; font-size: 0 !important; }
        
        /* visible y clickeable */
        .goog-te-combo {
            display: block !important;
            background-color: #1e293b !important;
            border: 1px solid #3b82f6 !important;
            color: #f1f5f9 !important;
            padding: 4px 8px !important;
            border-radius: 6px !important;
            font-size: 13px !important;
            visibility: visible !important;
        }

        /* Evitar que Google oculte contenido al insertar su barra */
        body { top: 0 !important; position: static !important; }
        .goog-te-banner-frame { display: none !important; }
    </style>
</head>
<body class="data-gradient text-slate-200 min-h-screen">

    <div class="fixed top-4 right-4 z-50 flex items-center gap-2 bg-slate-900/90 backdrop-blur-md p-2 rounded-lg border border-slate-700 shadow-2xl">
        <i class="fas fa-language text-blue-400 text-lg"></i>
        <div id="google_translate_element"></div>
    </div>

    <header class="container mx-auto px-6 py-24 text-center">
        <h1 class="text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
            Alejandro Adrián Duhalde
        </h1>
        <p class="text-xl text-slate-400 mb-8 max-w-2xl mx-auto italic">
            Technical Business Analyst | Data Engineer
        </p>
        
        <div class="flex flex-wrap justify-center gap-6 mb-12 opacity-80">
            <div class="flex flex-col items-center"><i class="fab fa-python text-3xl text-blue-400"></i><span class="text-[10px] mt-1 uppercase">Python</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-database text-3xl text-emerald-400"></i><span class="text-[10px] mt-1 uppercase">SQL/T-SQL</span></div>
            <div class="flex flex-col items-center"><i class="fab fa-microsoft text-3xl text-blue-500"></i><span class="text-[10px] mt-1 uppercase">Azure</span></div>
            <div class="flex flex-col items-center"><i class="fab fa-aws text-3xl text-orange-400"></i><span class="text-[10px] mt-1 uppercase">AWS</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-chart-bar text-3xl text-yellow-500"></i><span class="text-[10px] mt-1 uppercase">Power BI</span></div>
            <div class="flex flex-col items-center"><i class="fas fa-brain text-3xl text-purple-400"></i><span class="text-[10px] mt-1 uppercase">GenAI/RAG</span></div>
        </div>

        <div class="flex justify-center gap-4">
            <a href="#contact" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold transition">Contact Me</a>
            <a href="#posts" class="border border-slate-700 hover:bg-slate-800 px-8 py-3 rounded-lg transition">Read My Posts</a>
        </div>
    </header>

    <main class="container mx-auto px-6">
        <section id="posts" class="mb-20">
            <div class="flex items-center justify-between mb-10 border-b border-slate-700 pb-4">
                <h2 class="text-3xl font-bold font-mono text-blue-400">>_ Latest_Projects</h2>
            </div>
            <div id="posts-container" class="grid md:grid-cols-2 gap-8"></div>
        </section>
    </main>

    <footer id="contact" class="border-t border-slate-800 py-16 bg-slate-900/50 text-center">
        <div class="flex justify-center gap-10 text-3xl mb-8">
            <a href="mailto:aaduhalde@outlook.es" class="hover:text-blue-500 transition"><i class="fas fa-envelope"></i></a>
            <a href="http://www.linkedin.com/in/aaduhalde" class="hover:text-blue-500 transition"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/aaduhalde" class="hover:text-blue-500 transition"><i class="fab fa-github"></i></a>
        </div>
        <p class="text-sm text-slate-500 font-mono italic">Alejandro Adrián Duhalde | © 2026 Data Solutions</p>
    </footer>

    <script>
        const posts = [
            {
                title: "AI Agent for Customer Support: OpenAI + Google Sheets",
                tag: "AI / Bot",
                image: "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=800",
                description: "Built a serverless AI agent that automates data logging into Sheets. High commercial impact.",
                link: "#",
                tech: "Python, OpenAI, Cloud Functions"
            },
            {
                title: "Notion Productivity System: Ultimate No-Code Hub",
                tag: "Notion",
                image: "https://images.unsplash.com/photo-1614332287897-cdc485fa562d?auto=format&fit=crop&q=80&w=800",
                description: "Scalable Notion workspace for real-time tracking and operational efficiency.",
                link: "#",
                tech: "Notion API, No-Code"
            }
        ];

        const container = document.getElementById('posts-container');
        posts.forEach(post => {
            container.innerHTML += `
                <article class="bg-slate-800/60 rounded-2xl overflow-hidden border border-slate-700 card-hover flex flex-col shadow-xl">
                    <img src="${post.image}" class="w-full h-48 object-cover">
                    <div class="p-6 flex-grow">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-blue-400 border border-blue-400/30 px-2 py-1 rounded">${post.tag}</span>
                        <h3 class="text-xl font-bold mt-4 mb-3 text-white">${post.title}</h3>
                        <p class="text-slate-400 text-sm leading-relaxed mb-6">${post.description}</p>
                        <div class="text-[10px] font-mono text-slate-500 bg-slate-900/50 p-2 rounded">Tech: ${post.tech}</div>
                    </div>
                </article>
            `;
        });

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'es,en,pt',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
